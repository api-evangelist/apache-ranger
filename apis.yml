aid: apache-ranger
name: Apache Ranger
description: >-
  Apache Ranger is a framework to enable, monitor, and manage comprehensive data security across the Hadoop platform. It provides centralized security administration for fine-grained authorization policies
  across Hadoop ecosystem components.
type: Index
position: Consumer
access: 3rd-Party
